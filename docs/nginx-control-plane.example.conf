# =============================================================================
# VPN 控制面 — Nginx 配置示例（非安装器自动生成，请复制后按需修改）
#
# 默认约定（与项目代码/部署脚本一致）：
#   - vpn-api 监听本机 127.0.0.1:56700（环境变量 API_PORT，默认 56700）
#   - Vue 构建产物目录：/var/www/vpn-admin（deploy-control-plane.sh 会拷贝 dist 到此）
#
# 使用步骤（Debian/Ubuntu 示例）：
#   sudo cp docs/nginx-control-plane.example.conf /etc/nginx/sites-available/vpn
#   sudo ln -sf /etc/nginx/sites-available/vpn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 若管理台与 API 不同源，请在 vpn-api 上配置 CORS_ALLOWED_ORIGINS。
# =============================================================================

# --- 示例 A：HTTP，管理台监听 56701（与开发时 Vite 默认端口一致，便于记忆）---
server {
    listen 56701;
    # listen [::]:56701;
    server_name _;

    root /var/www/vpn-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:56700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}

