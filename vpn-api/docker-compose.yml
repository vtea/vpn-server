services:
  vpn-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_RELEASE_VERSION: ${AGENT_RELEASE_VERSION:-0.2.1-docker}
    image: vpn-api:local
    container_name: vpn-api
    restart: unless-stopped
    ports:
      - "56700:56700"
    env_file:
      - docker.env
    environment:
      API_PORT: "56700"
      DB_DRIVER: sqlite
      DB_PATH: /opt/vpn-api/data/vpn.db
      CA_DIR: /opt/vpn-api/ca
      VPN_AGENT_BIN_DIR: /opt/vpn-api/bin
    volumes:
      - ./docker-data/data:/opt/vpn-api/data
      - ./docker-data/ca:/opt/vpn-api/ca
      - ./docker-data/backups:/opt/vpn-api/backups

